services:
  postgres:
    image: postgres:16-alpine
    container_name: hbonline-db
    environment:
      POSTGRES_USER: hbonline
      POSTGRES_PASSWORD: hbonline
      POSTGRES_DB: hbonline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hbonline"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
