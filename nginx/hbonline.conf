# =============================================================================
# Helbreath Online — Nginx Configuration
# =============================================================================
#
# Domains:
#   helbreath.xyz       — Client (Phaser game)
#   api.helbreath.xyz   — Game server (REST + WebSocket)
#   cdn.helbreath.xyz   — Static assets (behind Cloudflare)
#
# Install:
#   sudo ln -s /opt/hbonline/nginx/hbonline.conf /etc/nginx/sites-enabled/hbonline.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL:
#   Option A — Cloudflare Full (Strict): place Cloudflare Origin cert at the paths below.
#   Option B — Let's Encrypt: uncomment the certbot include lines and comment out ssl_certificate.
#
# =============================================================================

# --- Shared SSL parameters (deduplicated) ------------------------------------
# Uncomment once you have certificates in place.
# ssl_certificate     /etc/ssl/cloudflare/helbreath.xyz.pem;
# ssl_certificate_key /etc/ssl/cloudflare/helbreath.xyz.key;
# ssl_protocols       TLSv1.2 TLSv1.3;
# ssl_ciphers         HIGH:!aNULL:!MD5;
# ssl_prefer_server_ciphers on;
# ssl_session_cache   shared:SSL:10m;
# ssl_session_timeout 10m;

# --- Rate limiting zones -----------------------------------------------------
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;

# --- Upstream: Go game server ------------------------------------------------
upstream gameserver {
    server 127.0.0.1:8080;
    keepalive 32;
}

# =============================================================================
# 1. helbreath.xyz — Client
# =============================================================================

# Redirect HTTP to HTTPS (uncomment when SSL is ready)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name helbreath.xyz www.helbreath.xyz;
#     return 301 https://helbreath.xyz$request_uri;
# }

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name helbreath.xyz www.helbreath.xyz;

    # SSL — self-signed origin cert (Cloudflare Full mode)
    ssl_certificate     /etc/ssl/cloudflare/helbreath.xyz.pem;
    ssl_certificate_key /etc/ssl/cloudflare/helbreath.xyz.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /opt/helbreath.xyz/client/dist;
    index index.html;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP: allow self, CDN for assets, API for connect (XHR/WS)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' https://cdn.helbreath.xyz data: blob:; media-src 'self' https://cdn.helbreath.xyz; font-src 'self'; connect-src 'self' https://api.helbreath.xyz wss://api.helbreath.xyz https://cdn.helbreath.xyz; worker-src 'self' blob:;" always;

    # SPA fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache JS/CSS bundles (Vite uses content hashes)
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }

    # Health check (optional, for load balancers)
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# =============================================================================
# 2. api.helbreath.xyz — Game Server (REST API + WebSocket)
# =============================================================================

# Redirect HTTP to HTTPS (uncomment when SSL is ready)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name api.helbreath.xyz;
#     return 301 https://api.helbreath.xyz$request_uri;
# }

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.helbreath.xyz;

    # SSL — self-signed origin cert (Cloudflare Full mode)
    ssl_certificate     /etc/ssl/cloudflare/helbreath.xyz.pem;
    ssl_certificate_key /etc/ssl/cloudflare/helbreath.xyz.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Security headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- WebSocket: /ws ---
    location /ws {
        limit_req zone=ws_limit burst=10 nodelay;

        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts — keep connections alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- REST API: /api/* ---
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # --- Health check ---
    location = /health {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Deny everything else
    location / {
        return 404;
    }
}

# =============================================================================
# 3. cdn.helbreath.xyz — Static Assets (Cloudflare-cached)
# =============================================================================

# Redirect HTTP to HTTPS (uncomment when SSL is ready)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name cdn.helbreath.xyz;
#     return 301 https://cdn.helbreath.xyz$request_uri;
# }

server {
    listen 80;
    listen [::]:80;
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    server_name cdn.helbreath.xyz;

    # --- SSL (uncomment when certificates are in place) ---
    # ssl_certificate     /etc/ssl/cloudflare/helbreath.xyz.pem;
    # ssl_certificate_key /etc/ssl/cloudflare/helbreath.xyz.key;

    root /opt/hbonline/client/dist;

    # --- CORS for cross-origin asset loading ---
    add_header Access-Control-Allow-Origin "https://helbreath.xyz" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range" always;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;

    # --- Game assets (sprites, maps, sounds, minimaps) ---
    # Long cache: Cloudflare respects Cache-Control.
    # When you update assets, purge the Cloudflare cache (zone purge or individual URLs).
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Access-Control-Allow-Origin "https://helbreath.xyz" always;

        # Enable gzip for compressible formats
        gzip on;
        gzip_types application/json application/javascript text/css;
    }

    # --- Vite-hashed bundles (JS/CSS) — immutable cache ---
    location ~* \.[0-9a-f]{8,}\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Access-Control-Allow-Origin "https://helbreath.xyz" always;
    }

    # Deny hidden files and non-asset paths
    location ~ /\. {
        deny all;
    }

    location = / {
        return 403;
    }
}
